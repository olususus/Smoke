name: Auto Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2 \
            rpm \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Get version + build number
        id: version
        run: |
          VERSION=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/version = "//;s/"//')
          COUNT=$(git rev-list --count HEAD)
          TAG="v${VERSION}.${COUNT}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "name=Smoke ${TAG}" >> $GITHUB_OUTPUT

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: ${{ steps.version.outputs.tag }}
          releaseName: ${{ steps.version.outputs.name }}
          releaseBody: |
            Automatic build from commit ${{ github.sha }}.

            - `.deb` — Debian / Ubuntu
            - `.rpm` — Fedora / RHEL
            - `.AppImage` — portable (any distro)

            Install `git` on your system before running Smoke.
          releaseDraft: false
          prerelease: true
          args: --target x86_64-unknown-linux-gnu
